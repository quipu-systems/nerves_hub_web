name: Run Manual Deployment

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Type of deployment"
        required: true
        default: "full"
        type: choice
        options:
          - "full-deployment"
          - "hot-upgrade"
      environment:
        description: "Environment to build and publish"
        required: true
        default: "prod"
        type: choice
        options:
          - "prod"

jobs:
  create-tag:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.save-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture GITHUB_SHORT_SHA
        run: |
          GITHUB_SHORT_SHA=$(git rev-parse --short=8 ${{ github.sha }})
          echo "GITHUB_SHORT_SHA=${GITHUB_SHORT_SHA}" >> $GITHUB_ENV

      - name: Capture and update project mix version
        id: save-tag
        run: |
          MIX_VERSION=`grep "version: " mix.exs | awk -F'"' '{print $2}' | cut -d'+' -f1`
          PROJ_TAG=${MIX_VERSION}+${GITHUB_SHORT_SHA}
          echo "PROJ_TAG=${PROJ_TAG}" >> $GITHUB_ENV
          echo "tag=$PROJ_TAG" >> "$GITHUB_OUTPUT"
          echo "Creating the tag: $PROJ_TAG"

      - uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: ${{ env.PROJ_TAG }}
          tag_exists_error: false
          message: "Created ${{ inputs.deployment }} tag ${{ env.PROJ_TAG }}"

  deploy-full-deployment:
    if: inputs.deployment == 'full-deployment'
    needs: create-tag
    uses: ./.github/workflows/full_deployment.yaml
    with:
      tag: ${{ needs.create-tag.outputs.tag }}
      environment: ${{ inputs.environment }}
    secrets: inherit

